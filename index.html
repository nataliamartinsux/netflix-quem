<!DOCTYPE html>
<html lang="pt-br">
<head>

    <main>

                <a href="#" class="profile">
                    <figure>
                        <img src="/assets/perfil3.png" alt="Retrato de uma inventora veterana com capacete de aviador e braços mecânicos que manipulam cristais energizados, cercada por ferramentas de precisão e luzes neon.">
